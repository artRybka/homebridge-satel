name: Release

# Triggered by pushing a tag of the form v* (e.g. v0.6.0-beta.0, v0.6.0, v1.2.3).
# Requires the NPM_TOKEN secret to be set in the repository settings
# (Settings → Secrets and variables → Actions → New repository secret).
# Generate the token at https://www.npmjs.com/settings/<user>/tokens — type
# "Automation" so it works without 2FA from CI.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Publish to npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "Pre-release: publishing with --tag beta"
            npm publish --tag beta
          else
            echo "Stable release: publishing with default (latest) tag"
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
