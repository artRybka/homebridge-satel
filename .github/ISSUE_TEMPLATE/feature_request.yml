name: Feature request
description: Suggest a new capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like?
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this help?
      description: Your use case; who benefits.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
