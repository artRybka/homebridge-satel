<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<title>Satel Integra</title>
<style>
body{font-family:system-ui,sans-serif;font-size:14px;margin:0;padding:16px 16px 80px;color:#24292e}
.banner{background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:10px 14px;margin-bottom:10px}
.banner.warn{background:#fff8c5;border-color:#d4a72c}
.banner h3{margin:0 0 4px;font-size:14px}
.banner p{margin:0;font-size:13px}
h2{font-size:15px;margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid #d0d7de;position:sticky;top:0;background:#fff;z-index:2}
h2 .count{color:#57606a;font-weight:400;font-size:12px}
.topbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.muted{color:#57606a;font-size:12px}
.stamp{color:#57606a;font-size:12px;margin:2px 0 10px}
.card{border:1px solid #d0d7de;border-radius:6px;padding:10px 12px;margin-bottom:6px;background:#fff;transition:background .15s,border-color .15s}
.card.on{background:#f4fbf6;border-color:#b7e1c0}
.card-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.card-head .id{color:#8c959f;font-variant-numeric:tabular-nums;min-width:32px;font-size:12px;font-weight:500}
.card-head .title{font-weight:600;flex:1;min-width:120px}
.card-body{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:8px;align-items:flex-start}
.f{display:flex;flex-direction:column;gap:3px;min-width:fit-content}
.f label{font-size:10.5px;text-transform:uppercase;color:#57606a;letter-spacing:.05em;font-weight:600}
.hint{font-size:11px;color:#8c959f;margin-top:2px;font-style:italic}
input[type=text],input[type=number],select{font:inherit;padding:5px 8px;border:1px solid #d0d7de;border-radius:5px;background:#fff;box-sizing:border-box;color:#24292e}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:none;border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.1)}
input[type=text]{width:220px}
input[type=number]{width:80px}
input[type=number]:disabled{background:#f6f8fa;color:#8c959f;cursor:not-allowed}
select{min-width:180px}
button{font:inherit;padding:5px 10px;border:1px solid #d0d7de;border-radius:5px;background:#fff;cursor:pointer}
button:hover{background:#f6f8fa}
button.p{background:#2da44e;border-color:#2da44e;color:#fff;padding:8px 20px;font-weight:500}
button.p:hover{background:#2c974b}
button.p:disabled{background:#94d3a2;cursor:default}
button.s{background:#0969da;border-color:#0969da;color:#fff;padding:7px 16px;font-weight:500}
button.s:hover{background:#0550ae}
button.s:disabled{background:#80b3e6;cursor:default}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.badge.ok{background:#dafbe1;color:#1a7f37}
.badge.warn{background:#fff8c5;color:#7a5c00}
.hkm{display:flex;gap:6px 14px;flex-wrap:wrap}
.hkm label{display:inline-flex;gap:4px;cursor:pointer;font-size:12px;user-select:none}
.savebar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #d0d7de;padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;box-shadow:0 -2px 8px rgba(0,0,0,.05);z-index:10}
.sh-ud{display:flex;gap:4px;align-items:center}
.sh-ud .id{font-weight:500;color:#24292e;font-size:13px;min-width:22px;text-align:center}
.sh-ud button{padding:3px 6px;font-size:11px;min-width:26px}
</style>
</head>
<body>
<div id="app"><div class="banner" id="status">Ładowanie…</div></div>
<script>
(async()=>{
const app=document.getElementById('app');
const sBanner=document.getElementById('status');
const ZT=[['motion','Ruch'],['contact','Otwarcie'],['smoke','Dym'],['leak','Zalanie'],['co','CO'],['occupancy','Obecność']];
const AM=[[0,'Tryb 0 (pełne)'],[1,'Tryb 1'],[2,'Tryb 2 (dzienne)'],[3,'Tryb 3 (nocne)']];
const HK=[['off','Off'],['home','Home'],['night','Night'],['away','Away']];
const OR=[['switch-toggle','Przełącznik bistabilny'],['switch-pulse','Przełącznik impulsowy'],['lock','Elektrozaczep']];

topBar();
let disc;
try{disc=await homebridge.request('/discovery')}catch(e){setB('warn','Błąd',msg(e));homebridge.showSchemaForm();return}
const [cfg]=(await homebridge.getPluginConfig());const C=cfg||{};
if(!disc.available){setB('warn','Brak zeskanowanych danych','Kliknij „Wymuś skan" lub włącz <code>autoDiscover</code> i zrestartuj Homebridge.');homebridge.showSchemaForm();return}
setB('ok','Auto-discovery','Zaznacz urządzenia do wystawienia w HomeKit, popraw nazwy i typy. Pary wyjść o tej samej nazwie pojawiają się jako „Rolety".');
const st=document.createElement('div');st.className='stamp';st.textContent='Ostatni skan: '+(disc.discoveredAt||'—');app.appendChild(st);

const eP=new Map((C.partitions||[]).map(p=>[p.id,p]));
const eZ=new Map((C.zones||[]).map(z=>[z.id,z]));
const eSw=new Map((C.switches||[]).map(s=>[s.output,s]));
const eLk=new Map((C.locks||[]).map(l=>[l.output,l]));
const eSh=C.shutters||[];

// PARTITIONS
const pItems=[];
section('Partycje (strefy)',disc.partitions.length);
disc.partitions.forEach(d=>{
  const x=eP.get(d.id);
  const nameI=inp('text',(x&&x.name)||d.name);
  const home=sel(AM,(x&&x.armHomeMode)??2);
  const night=sel(AM,(x&&x.armNightMode)??3);
  const modes=hkModes((x&&x.homekitModes)||['off','home','night','away']);
  const {card,cb,badge}=mkCard(d.id,d.name,!!x);
  card.appendChild(body([
    field('Nazwa w HomeKit',nameI,d.name),
    field('Tryb Home',home),
    field('Tryb Night',night),
    field('Widoczne w HomeKit',modes.el),
  ]));
  pItems.push({d,cb,badge,nameI,home,night,modes,x});
});

// ZONES
const zItems=[];
section('Wejścia (czujki)',disc.zones.length);
disc.zones.forEach(d=>{
  const x=eZ.get(d.id);
  const nameI=inp('text',(x&&x.name)||d.name);
  const ts=sel(ZT,(x&&x.type)||'motion');
  const {card,cb,badge}=mkCard(d.id,d.name,!!x);
  card.appendChild(body([
    field('Nazwa w HomeKit',nameI,d.name),
    field('Typ HomeKit',ts),
  ]));
  zItems.push({d,cb,badge,nameI,ts,x});
});

// SHUTTERS
const shutterRows=buildShutters(disc.outputs,eSh);
const usedSh=new Set();shutterRows.forEach(s=>{usedSh.add(s.outputUp);usedSh.add(s.outputDown)});
section('Rolety (para wyjść o tej samej nazwie)',shutterRows.length);
const shHint=document.createElement('p');shHint.className='muted';shHint.innerHTML='Impuls <b>0</b> = wyjścia bistabilne (plugin steruje czasem). <b>&gt;0</b> = kontroler rolet w Satelu (impuls start/stop).';app.appendChild(shHint);
const shItems=[];
if(shutterRows.length===0){
  const p=document.createElement('p');p.className='muted';p.textContent='Brak par. Dodaj rolety ręcznie w config.json jeśli trzeba.';app.appendChild(p);
}
shutterRows.forEach(s=>{
  const nameI=inp('text',s.name);
  const up=numCell(s.outputUp),dn=numCell(s.outputDown);
  const swap=document.createElement('button');swap.textContent='↕';swap.title='Zamień górę i dół';
  swap.onclick=e=>{e.preventDefault();const a=up.textContent;up.textContent=dn.textContent;dn.textContent=a};
  const tU=inp('number',s.travelUpSec,{min:1,max:600});
  const tD=inp('number',s.travelDownSec,{min:1,max:600});
  const ex=inp('number',s.extraPulseSec,{min:0,max:30});
  const pu=inp('number',s.pulseMs,{min:0,max:10000,step:50});
  const configured=s._src==='cfg';
  const card=document.createElement('div');card.className='card'+(configured?' on':'');
  const head=document.createElement('div');head.className='card-head';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=configured;head.appendChild(cb);
  const t=document.createElement('span');t.className='title';t.textContent=s.name+' ('+s.outputUp+'/'+s.outputDown+')';head.appendChild(t);
  const badge=statusBadge(configured);head.appendChild(badge);
  cb.addEventListener('change',()=>{card.classList.toggle('on',cb.checked);badge.replaceWith(statusBadge(cb.checked));});
  card.appendChild(head);
  const b=document.createElement('div');b.className='card-body';
  b.appendChild(field('Nazwa w HomeKit',nameI));
  const gd=document.createElement('div');gd.className='f';gd.innerHTML='<label>Góra / Dół</label>';
  const wrap=document.createElement('div');wrap.className='sh-ud';
  wrap.appendChild(up);wrap.appendChild(document.createTextNode('/'));wrap.appendChild(dn);wrap.appendChild(swap);
  gd.appendChild(wrap);b.appendChild(gd);
  b.appendChild(field('Otwarcie [s]',tU));
  b.appendChild(field('Zamknięcie [s]',tD));
  b.appendChild(field('Ekstra [s]',ex));
  b.appendChild(field('Impuls [ms]',pu));
  card.appendChild(b);
  app.appendChild(card);
  shItems.push({cb,nameI,up,dn,tU,tD,ex,pu});
});

// OUTPUTS
const singleOut=disc.outputs.filter(o=>!usedSh.has(o.id));
const oItems=[];
section('Wyjścia pojedyncze (switch / lock)',singleOut.length);
singleOut.forEach(d=>{
  const xs=eSw.get(d.id),xl=eLk.get(d.id);
  let role='switch-toggle',pms=500,hk=d.name;
  if(xl){role='lock';pms=xl.pulseMs||1500;hk=xl.name||d.name}
  else if(xs){role=xs.mode==='pulse'?'switch-pulse':'switch-toggle';pms=xs.pulseMs||500;hk=xs.name||d.name}
  const nameI=inp('text',hk);
  const rs=sel(OR,role);
  const pu=inp('number',pms,{min:50,max:10000,step:50});
  const update=()=>{pu.disabled=rs.value==='switch-toggle';if(pu.disabled&&!pu.value)pu.value='500'};
  rs.addEventListener('change',update);update();
  const {card,cb,badge}=mkCard(d.id,d.name,!!(xs||xl));
  card.appendChild(body([
    field('Nazwa w HomeKit',nameI,d.name),
    field('Rola',rs),
    field('Impuls [ms]',pu),
  ]));
  oItems.push({d,cb,badge,nameI,rs,pu,xs,xl});
});

// SAVE — sticky bar so it's always reachable with many cards
const act=document.createElement('div');act.className='savebar';
const save=document.createElement('button');save.className='p';save.textContent='Zapisz konfigurację';act.appendChild(save);
const saveMsg=document.createElement('span');saveMsg.className='muted';act.appendChild(saveMsg);
document.body.appendChild(act);
save.onclick=async()=>{
  save.disabled=true;saveMsg.textContent='Zapisywanie…';
  const partitions=pItems.filter(r=>r.cb.checked).map(r=>({
    id:r.d.id,name:(r.nameI.value||r.d.name).trim(),
    armHomeMode:+r.home.value,armNightMode:+r.night.value,
    homekitModes:r.modes.get()
  }));
  const zones=zItems.filter(r=>r.cb.checked).map(r=>({
    id:r.d.id,name:(r.nameI.value||r.d.name).trim(),
    type:r.ts.value,invert:(r.x&&r.x.invert)||false
  }));
  const shutters=shItems.filter(r=>r.cb.checked).map(r=>({
    name:(r.nameI.value||'').trim()||('Roleta '+r.up.textContent),
    outputUp:+r.up.textContent,outputDown:+r.dn.textContent,
    travelUpSec:+r.tU.value,travelDownSec:+r.tD.value,
    extraPulseSec:+r.ex.value,pulseMs:+r.pu.value
  }));
  const switches=[],locks=[];
  oItems.forEach(r=>{
    if(!r.cb.checked)return;
    const n=(r.nameI.value||r.d.name).trim();
    if(r.rs.value==='lock')locks.push({name:n,output:r.d.id,pulseMs:+r.pu.value||1500});
    else if(r.rs.value==='switch-pulse')switches.push({name:n,output:r.d.id,mode:'pulse',pulseMs:+r.pu.value||500});
    else switches.push({name:n,output:r.d.id,mode:'toggle',pulseMs:+r.pu.value||500});
  });
  const next={...C,partitions,zones,shutters,switches,locks,temperatures:C.temperatures||[]};
  if(!next.platform)next.platform='SatelIntegra';
  try{
    await homebridge.updatePluginConfig([next]);
    await homebridge.savePluginConfig();
    saveMsg.textContent='Zapisano. Homebridge zrestartuje platformę.';
    refreshBadges();
  }catch(e){saveMsg.textContent='Błąd zapisu: '+msg(e)}
  finally{save.disabled=false}
};
homebridge.showSchemaForm();

// helpers
function topBar(){
  const bar=document.createElement('div');bar.className='topbar';
  const b=document.createElement('button');b.className='s';b.textContent='Wymuś ponowny skan z centrali';
  const m=document.createElement('span');m.className='muted';
  bar.appendChild(b);bar.appendChild(m);app.appendChild(bar);
  b.onclick=async()=>{
    if(!confirm('Usunąć cache i zrestartować Homebridge? Nowy skan zajmie ~60 s.'))return;
    b.disabled=true;m.textContent='Czyszczenie cache + restart…';
    try{await homebridge.request('/rescan');await homebridge.restartHomebridge();m.textContent='Homebridge się restartuje — odśwież za minutę.'}
    catch(e){m.textContent='Błąd: '+msg(e);b.disabled=false}
  };
}
function setB(k,t,h){sBanner.className='banner'+(k==='warn'?' warn':'');sBanner.innerHTML='<h3>'+esc(t)+'</h3><p>'+h+'</p>'}
function section(t,n){const h=document.createElement('h2');h.innerHTML=esc(t)+' <span class="count">('+n+')</span>';app.appendChild(h)}
function mkCard(id,satelName,on){
  const card=document.createElement('div');card.className='card'+(on?' on':'');
  const head=document.createElement('div');head.className='card-head';
  const cb=document.createElement('input');cb.type='checkbox';cb.checked=on;head.appendChild(cb);
  const idEl=document.createElement('span');idEl.className='id';idEl.textContent='#'+id;head.appendChild(idEl);
  const t=document.createElement('span');t.className='title';t.textContent=satelName;head.appendChild(t);
  const b=statusBadge(on);head.appendChild(b);
  cb.addEventListener('change',()=>{card.classList.toggle('on',cb.checked);b.replaceWith(statusBadge(cb.checked))});
  card.appendChild(head);app.appendChild(card);
  return {card,cb,badge:b};
}
function body(fields){const b=document.createElement('div');b.className='card-body';fields.forEach(f=>b.appendChild(f));return b}
function field(label,el,hint){
  const d=document.createElement('div');d.className='f';
  const l=document.createElement('label');l.textContent=label;d.appendChild(l);
  d.appendChild(el);
  if(hint&&(!el.value||el.value!==hint)){const h=document.createElement('span');h.className='hint';h.textContent='Satel: '+hint;d.appendChild(h)}
  return d;
}
function inp(type,val,attrs){const i=document.createElement('input');i.type=type;i.value=val==null?'':String(val);if(attrs){if(attrs.min!=null)i.min=attrs.min;if(attrs.max!=null)i.max=attrs.max;if(attrs.step!=null)i.step=attrs.step}return i}
function sel(opts,val){const s=document.createElement('select');opts.forEach(([v,l])=>{const o=document.createElement('option');o.value=String(v);o.textContent=l;if(String(v)===String(val))o.selected=true;s.appendChild(o)});return s}
function hkModes(selected){
  const el=document.createElement('div');el.className='hkm';const cbs={};
  HK.forEach(([v,l])=>{const lab=document.createElement('label');const c=document.createElement('input');c.type='checkbox';c.checked=selected.indexOf(v)!==-1;cbs[v]=c;lab.appendChild(c);lab.appendChild(document.createTextNode(' '+l));el.appendChild(lab)});
  return {el,get:()=>HK.filter(([v])=>cbs[v].checked).map(([v])=>v)};
}
function numCell(v){const s=document.createElement('span');s.className='id';s.textContent=String(v);return s}
function statusBadge(on){const s=document.createElement('span');s.className='badge '+(on?'ok':'warn');s.textContent=on?'✓ Skonfigurowane':'— nieaktywne';return s}
function buildShutters(outs,existing){
  const byName=new Map();outs.forEach(o=>{const k=(o.name||'').trim().toLowerCase();if(!k)return;(byName.get(k)||byName.set(k,[]).get(k)).push(o)});
  const keyset=new Set();existing.forEach(s=>{keyset.add(s.outputUp+':'+s.outputDown);keyset.add(s.outputDown+':'+s.outputUp)});
  const sug=[];byName.forEach(g=>{if(g.length!==2)return;const [a,b]=g.sort((x,y)=>x.id-y.id);if(keyset.has(a.id+':'+b.id))return;sug.push({name:a.name,outputUp:a.id,outputDown:b.id,travelUpSec:25,travelDownSec:25,extraPulseSec:2,pulseMs:0,_src:'sug'})});
  const cfg=existing.map(s=>({name:s.name,outputUp:s.outputUp,outputDown:s.outputDown,travelUpSec:s.travelUpSec||s.travelTimeSec||25,travelDownSec:s.travelDownSec||s.travelTimeSec||25,extraPulseSec:s.extraPulseSec!=null?s.extraPulseSec:2,pulseMs:s.pulseMs!=null?s.pulseMs:0,_src:'cfg'}));
  return cfg.concat(sug);
}
function refreshBadges(){
  [...pItems,...zItems,...oItems].forEach(r=>{const nb=statusBadge(r.cb.checked);r.badge.replaceWith(nb);r.badge=nb});
  shItems.forEach(r=>{const card=r.cb.closest('.card');const b=card&&card.querySelector('.badge');if(b)b.replaceWith(statusBadge(r.cb.checked))});
}
function msg(e){return(e&&e.message)||String(e)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
})();
</script>
</body>
</html>
